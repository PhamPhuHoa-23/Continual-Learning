# VARIANT 3: Large Prototype Count
# - 512 prototypes per agent (more expressive)
# - AdaSlot
# - Top-k selection
# - May require more memory & longer training

_base_: ../config.yaml

experiment:
  name: "large_prototypes"
  description: |
    Agents with 512 prototypes each for more expressive hidden labels.
    May require more memory and training time.
  tags:
    - "large-prototypes"
    - "expressive"

agents:
  num_prototypes: 512
  hidden_dim: 384  # Increase hidden dim as well

training:
  phase1_agents:
    batch_size: 16  # Reduce batch size due to memory
    epochs: 15      # More epochs for convergence


