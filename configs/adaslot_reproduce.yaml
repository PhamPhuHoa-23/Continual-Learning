# AdaSlot Reproduction Training Configuration
#
# Follows the original AdaSlot implementation exactly:
# - Loss: Reconstruction (MSE sum) + Sparsity penalty
# - Temperature annealing: τ(t) = max(0.5, 1.0 * exp(-0.00003*t))
# - Adaptive slot selection with Gumbel-Softmax
#
# Usage: python train_adaslot_reproduce.py --config configs/adaslot_reproduce.yaml

# Dataset
dataset: "cifar100"
data_root: "./data"
n_experiences: 10          # Number of tasks (for benchmark)
batch_size: 64
num_workers: 4

# Model Architecture
feature_dim: 128           # Feature dimension from encoder
slot_dim: 64               # Dimension of each slot
num_slots: 7               # Number of slots to initialize
num_iterations: 3          # Slot attention iterations
min_slots: 1               # Minimum slots to keep (gumbel_low_bound)

# Temperature Annealing
temperature_init: 1.0      # Initial temperature
temperature_min: 0.5       # Minimum temperature
temperature_decay: 0.00003 # Decay rate: τ(t) = max(τ_min, τ_init * exp(-decay*t))

# Training
epochs: 100                # Total epochs
lr: 0.0003                 # Learning rate (3e-4)
weight_decay: 0.0001       # Weight decay (1e-4)

# Loss Weights (following AdaSlot source)
recon_weight: 1.0                  # Reconstruction loss weight
sparse_linear_weight: 1.0          # Sparsity linear penalty (encourages dropping)
sparse_quadratic_weight: 0.0       # Sparsity quadratic penalty (set to 0)
sparse_bias: 0.5                   # Target mean keep probability

# Output
output_dir: "checkpoints/adaslot_reproduce"
save_interval: 10          # Save checkpoint every N epochs
log_interval: 100          # Log every N batches

# System
device: "cuda"
seed: 42

# ============================================================================
# Notes
# ============================================================================
# 
# Differences from multi-phase training:
# 1. No primitive loss (not in AdaSlot paper)
# 2. Sparsity penalty follows exact AdaSlot implementation
# 3. Uses MSE sum reduction (not mean)
# 4. Trains on all data (not task-by-task)
#
# Expected results (CIFAR-100):
# - Reconstruction MSE: ~0.5-1.0
# - Sparsity: ~0.3-0.5 (mean keep prob)
# - Kept slots: ~2-4 out of 7
# - Training time: ~3-4 hours on GPU

