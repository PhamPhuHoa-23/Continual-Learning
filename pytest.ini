[pytest]
# Pytest configuration for Continual Learning project

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    
# Coverage options (uncomment to enable)
# addopts =
#     -v
#     --tb=short
#     --cov=src
#     --cov-report=html
#     --cov-report=term-missing

# Markers (for organizing tests)
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    data: marks tests for data pipeline
    model: marks tests for models
    training: marks tests for training

# Ignore certain directories
norecursedirs = .git .venv venv env Setup data

# Timeout for tests (in seconds)
timeout = 300

# Logging
log_cli = false
log_cli_level = INFO

